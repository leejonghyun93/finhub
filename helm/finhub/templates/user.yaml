{{- if .Values.user.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-user
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.user.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-user
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-user
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Release.Name }}-postgres -p {{ .Values.infrastructure.postgres.port }}; do echo "Waiting for PostgreSQL..."; sleep 2; done
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - until redis-cli -h {{ .Release.Name }}-redis -p {{ .Values.infrastructure.redis.port }} ping 2>/dev/null | grep -q PONG; do echo "Waiting for Redis..."; sleep 2; done
        - name: wait-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://{{ .Release.Name }}-eureka:{{ .Values.eureka.port }}/actuator/health 2>/dev/null | grep -q UP; do echo "Waiting for Eureka..."; sleep 3; done
      containers:
        - name: user
          image: "{{ .Values.user.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.user.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.user.db }}"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            {{- toYaml .Values.user.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-user
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-user
  ports:
    - port: {{ .Values.user.port }}
      targetPort: {{ .Values.user.port }}
{{- end }}
