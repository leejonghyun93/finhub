{{- if .Values.notification.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-notification
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notification.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-notification
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-notification
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgres {{ .Values.infrastructure.postgres.port }}; do echo "Waiting for PostgreSQL..."; sleep 3; done
              until nc -z {{ .Release.Name }}-redis {{ .Values.infrastructure.redis.port }}; do echo "Waiting for Redis..."; sleep 3; done
              until nc -z {{ .Release.Name }}-kafka {{ .Values.infrastructure.kafka.port }}; do echo "Waiting for Kafka..."; sleep 3; done
              until nc -z {{ .Release.Name }}-eureka {{ .Values.eureka.port }}; do echo "Waiting for Eureka..."; sleep 3; done
      containers:
        - name: notification
          image: "{{ .Values.notification.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.notification.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.notification.db }}"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            {{- toYaml .Values.notification.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-notification
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-notification
  ports:
    - port: {{ .Values.notification.port }}
      targetPort: {{ .Values.notification.port }}
{{- end }}
