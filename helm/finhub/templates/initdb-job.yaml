{{- if .Values.infrastructure.postgres.enabled }}
# PostgreSQL 멀티 데이터베이스 초기화 Job
# postgres가 준비된 후 각 서비스용 DB를 생성합니다
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-initdb
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgres -p {{ .Values.infrastructure.postgres.port }}; do
                echo "Waiting for PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: initdb
          image: {{ .Values.infrastructure.postgres.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: POSTGRES_PASSWORD
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: POSTGRES_USER
            - name: PGHOST
              value: {{ .Release.Name }}-postgres
            - name: PGPORT
              value: {{ .Values.infrastructure.postgres.port | quote }}
          command:
            - sh
            - -c
            - |
              for DB in finhub_user finhub_banking finhub_investment finhub_payment finhub_insurance finhub_search finhub_notification finhub_ai; do
                psql -c "SELECT 1 FROM pg_database WHERE datname='$DB'" | grep -q 1 \
                  || psql -c "CREATE DATABASE $DB;"
                echo "Database $DB: OK"
              done
              echo "All databases initialized!"
{{- end }}
