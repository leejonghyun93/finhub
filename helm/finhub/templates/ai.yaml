{{- if .Values.ai.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ai.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:15-alpine
          command: ["/bin/sh", "-c", "until pg_isready -h {{ .Release.Name }}-postgres -p {{ .Values.infrastructure.postgres.port }}; do echo 'Waiting for PostgreSQL...'; sleep 2; done; echo 'PostgreSQL ready, waiting 10s...'; sleep 10"]
        - name: wait-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://{{ .Release.Name }}-eureka:{{ .Values.eureka.port }}/actuator/health 2>/dev/null | grep -q UP; do echo "Waiting for Eureka..."; sleep 3; done
        {{- if .Values.infrastructure.ollama.enabled }}
        - name: wait-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://{{ .Release.Name }}-ollama:{{ .Values.infrastructure.ollama.port }} 2>/dev/null; do echo "Waiting for Ollama..."; sleep 3; done
        {{- end }}
      containers:
        - name: ai
          image: "{{ .Values.ai.image }}:{{ .Values.ai.imageTag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ai.port }}
          env:
            - name: APP_NAME
              value: "finhub-ai"
            - name: APP_PORT
              value: {{ .Values.ai.port | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.ai.db }}"
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ai.ollamaBaseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ai.ollamaModel | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.ai.ollamaEmbedModel | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: JWT_SECRET
            - name: EUREKA_SERVER_URL
              value: "http://{{ .Release.Name }}-eureka:{{ .Values.eureka.port }}/eureka"
          resources:
            {{- toYaml .Values.ai.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ai
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-ai
  ports:
    - port: {{ .Values.ai.port }}
      targetPort: {{ .Values.ai.port }}
{{- end }}
