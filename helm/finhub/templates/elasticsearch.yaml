{{- if .Values.infrastructure.elasticsearch.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-elasticsearch-pvc
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.infrastructure.elasticsearch.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-elasticsearch
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-elasticsearch
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-elasticsearch
    spec:
      initContainers:
        # Elasticsearch는 vm.max_map_count >= 262144 필요
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: {{ .Values.infrastructure.elasticsearch.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.infrastructure.elasticsearch.port }}
            - containerPort: 9300
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.infrastructure.elasticsearch.javaOpts | quote }}
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-elasticsearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-elasticsearch
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-elasticsearch
  ports:
    - name: http
      port: {{ .Values.infrastructure.elasticsearch.port }}
      targetPort: {{ .Values.infrastructure.elasticsearch.port }}
    - name: transport
      port: 9300
      targetPort: 9300
{{- end }}
