{{- if .Values.banking.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-banking
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.banking.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-banking
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-banking
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Release.Name }}-postgres -p {{ .Values.infrastructure.postgres.port }}; do echo "Waiting for PostgreSQL..."; sleep 2; done
        - name: wait-kafka
          image: busybox:1.36
          command: ["/bin/sh", "-c", "echo 'Waiting for Kafka 40s...'; sleep 40; echo 'Done'"]
        - name: wait-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://{{ .Release.Name }}-eureka:{{ .Values.eureka.port }}/actuator/health 2>/dev/null | grep -q UP; do echo "Waiting for Eureka..."; sleep 3; done
      containers:
        - name: banking
          image: "{{ .Values.banking.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.banking.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.banking.db }}"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            {{- toYaml .Values.banking.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-banking
  labels:
    {{- include "finhub.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-banking
  ports:
    - port: {{ .Values.banking.port }}
      targetPort: {{ .Values.banking.port }}
{{- end }}
