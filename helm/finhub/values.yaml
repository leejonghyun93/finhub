# ============================================================
# Global
# ============================================================
global:
  imageTag: latest
  imagePullPolicy: Never   # minikube 로컬 이미지 사용

# ============================================================
# Secrets (민감정보 - 실 운영 시 반드시 변경)
# ============================================================
postgres:
  username: postgres
  password: postgres        # Secret으로 관리

jwtSecret: "finhub-secret-key-must-be-at-least-256-bits-long-for-hs256"

# ============================================================
# Infrastructure
# ============================================================
infrastructure:
  postgres:
    enabled: true
    image: pgvector/pgvector:pg16
    port: 5432
    storage: 2Gi

  redis:
    enabled: true
    image: redis:7-alpine
    port: 6379

  zookeeper:
    enabled: true
    image: confluentinc/cp-zookeeper:7.6.0
    port: 2181

  kafka:
    enabled: true
    image: confluentinc/cp-kafka:7.6.0
    port: 9092

  elasticsearch:
    enabled: true
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    port: 9200
    storage: 2Gi
    javaOpts: "-Xms512m -Xmx512m"

# ============================================================
# Application Services
# ============================================================
eureka:
  enabled: true
  image: finhub-finhub-eureka
  port: 8761
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

gateway:
  enabled: true
  image: finhub-finhub-gateway
  imageTag: v4
  port: 8080
  replicas: 1
  # minikube 외부 접근용 NodePort
  service:
    type: NodePort
    nodePort: 30080
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

