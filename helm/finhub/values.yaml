# ============================================================
# Global
# ============================================================
global:
  imageTag: latest
  imagePullPolicy: Never   # minikube 로컬 이미지 사용

# ============================================================
# Secrets
# ⚠️ 아래 값은 로컬/개발 환경 기본값입니다.
# 실제 배포 시 반드시 아래 방법으로 override하세요:
#   helm upgrade finhub helm/finhub \
#     --set postgres.password=실제비밀번호 \
#     --set jwtSecret=실제JWT시크릿
# 또는 별도 secrets.yaml 파일로 관리하세요 (git 제외)
# ============================================================
postgres:
  username: postgres
  password: postgres

jwtSecret: "finhub-secret-key-must-be-at-least-256-bits-long-for-hs256"

# ============================================================
# Infrastructure
# ============================================================
infrastructure:
  postgres:
    enabled: true
    image: pgvector/pgvector:pg16
    port: 5432
    storage: 2Gi

  redis:
    enabled: true
    image: redis:7-alpine
    port: 6379

  zookeeper:
    enabled: true
    image: confluentinc/cp-zookeeper:7.6.0
    port: 2181

  kafka:
    enabled: true
    image: confluentinc/cp-kafka:7.6.0
    port: 9092

  elasticsearch:
    enabled: true
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    port: 9200
    storage: 2Gi
    javaOpts: "-Xms512m -Xmx512m"

  ollama:
    enabled: false
    image: ollama/ollama:latest
    port: 11434
    storage: 10Gi
    models:
      - llama3.2
      - nomic-embed-text
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "8Gi"
        cpu: "4000m"

# ============================================================
# Application Services
# ============================================================
eureka:
  enabled: true
  image: finhub-finhub-eureka
  port: 8761
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

gateway:
  enabled: true
  image: finhub-finhub-gateway
  imageTag: v6
  port: 8080
  replicas: 1
  # minikube 외부 접근용 NodePort
  service:
    type: NodePort
    nodePort: 30080
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

user:
  enabled: true
  image: finhub-finhub-user
  port: 8081
  replicas: 1
  db: finhub_user
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

banking:
  enabled: true
  image: finhub-finhub-banking
  port: 8082
  replicas: 1
  db: finhub_banking
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

investment:
  enabled: true
  image: finhub-finhub-investment
  port: 8083
  replicas: 1
  db: finhub_investment
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

payment:
  enabled: true
  image: finhub-finhub-payment
  port: 8084
  replicas: 1
  db: finhub_payment
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

insurance:
  enabled: true
  image: finhub-finhub-insurance
  port: 8085
  replicas: 1
  db: finhub_insurance
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

search:
  enabled: true
  image: finhub-finhub-search
  port: 8086
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

notification:
  enabled: true
  image: finhub-finhub-notification
  port: 8088
  replicas: 1
  db: finhub_notification
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

ai:
  enabled: true
  image: finhub-finhub-ai
  imageTag: v2
  port: 8087
  replicas: 1
  db: finhub_ai
  ollamaBaseUrl: "http://192.168.65.254:11434"
  ollamaModel: "llama3.2"
  ollamaEmbedModel: "nomic-embed-text"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================
# Monitoring
# ============================================================
monitoring:
  enabled: true
  prometheus:
    image: prom/prometheus:latest
    port: 9090
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  grafana:
    image: grafana/grafana:10.4.3
    port: 3000
    nodePort: 30030
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "300m"
