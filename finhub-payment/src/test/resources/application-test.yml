spring:
  datasource:
    url: jdbc:h2:mem:finhub_payment;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092  # KafkaTemplate은 @MockBean으로 대체되므로 실제 연결 불필요

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: finhub-secret-key-must-be-at-least-256-bits-long-for-hs256
