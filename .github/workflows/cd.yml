name: CD - Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/finhub

jobs:
  # ============================================================
  # Spring Boot Services - Docker Build & Push
  # ============================================================
  docker-spring:
    name: Docker ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: finhub-eureka
            module: finhub-eureka
          - name: finhub-gateway
            module: finhub-gateway
          - name: finhub-user
            module: finhub-user
          - name: finhub-banking
            module: finhub-banking
          - name: finhub-investment
            module: finhub-investment
          - name: finhub-payment
            module: finhub-payment
          - name: finhub-insurance
            module: finhub-insurance
          - name: finhub-search
            module: finhub-search
          - name: finhub-notification
            module: finhub-notification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -pl ${{ matrix.service.module }} -am -DskipTests
        env:
          MAVEN_OPTS: "-Xmx512m"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.module }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # finhub-ai (FastAPI) - Docker Build & Push
  # ============================================================
  docker-ai:
    name: Docker finhub-ai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-finhub-ai
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: finhub-ai
          file: finhub-ai/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy Summary
  # NOTE: minikube 로컬 환경에서는 아래 방식으로 수동 배포
  #
  #   eval $(minikube docker-env)
  #   docker compose build
  #   helm upgrade finhub helm/finhub -n finhub --timeout 30m
  #
  # 실제 클러스터(EKS/GKE) 배포 시 아래 deploy job 활성화
  # ============================================================
  cd-success:
    name: CD Passed
    needs: [docker-spring, docker-ai]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.docker-spring.result }}" == "success" && "${{ needs.docker-ai.result }}" == "success" ]]; then
            echo "✅ All Docker images pushed to Docker Hub"
            echo "Images: ${{ env.IMAGE_PREFIX }}-finhub-{service}:latest"
          else
            echo "❌ CD failed - spring: ${{ needs.docker-spring.result }}, ai: ${{ needs.docker-ai.result }}"
            exit 1
          fi

  # ============================================================
  # [Optional] Kubernetes Deploy - 실제 클러스터 배포 시 활성화
  # secrets 추가 필요: KUBE_CONFIG (base64 encoded kubeconfig)
