server:
  port: 8086
  tomcat:
    threads:
      max: 200

spring:
  application:
    name: finhub-search

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:finhub-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    prometheus:
      enabled: true
